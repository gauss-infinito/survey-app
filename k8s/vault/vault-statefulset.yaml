apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: registry.connect.redhat.com/hashicorp/vault:latest

          ports:
            - containerPort: 8200
              name: http

          env:
            - name: SKIP_CHOWN
              value: "true"
            - name: SKIP_SETCAP
              value: "true"
            - name: VAULT_LOCAL_CONFIG
              value: |
                {
                  "storage": {
                    "file": {
                      "path": "/vault/data"
                    }
                  },
                  "listener": [{
                    "tcp": {
                      "address": "0.0.0.0:8200",
                      "tls_disable": true
                    }
                  }],
                  "ui": true
                }

          volumeMounts:
            - name: vault-data
              mountPath: /vault/data

  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

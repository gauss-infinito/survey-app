apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: default
      securityContext:
        fsGroup: 1000
      containers:
        - name: vault
          image: registry.connect.redhat.com/hashicorp/vault:latest

          ports:
            - containerPort: 8200
              name: http
              
          env:
            - name: VAULT_ADDR
              value: "http://0.0.0.0:8200"
              
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data

            - name: init-db
              mountPath: /opt/app-root/src/initdb.d              

      volumes:
        - name: vault-config
          configMap:
            name: vault-config
            
  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

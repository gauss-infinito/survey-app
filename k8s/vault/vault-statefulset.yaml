apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: default
      securityContext:
        fsGroup: 1000
      containers:
        - name: vault
          image: registry.connect.redhat.com/hashicorp/vault:latest
          args:
            - "server"
            - "-config=/vault/config/vault.hcl"
          ports:
            - containerPort: 8200
              name: http
          env:
            - name: VAULT_ADDR
              value: "http://0.0.0.0:8200"
          volumeMounts:
            # Config (read-only)
            - name: config
              mountPath: /vault/config
              readOnly: true

            # Storage gravável
            - name: tmp
              mountPath: /tmp

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: config
          configMap:
            name: vault-config

        - name: tmp
          emptyDir: {}

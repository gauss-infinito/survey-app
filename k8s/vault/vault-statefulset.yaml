apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
spec:
  serviceName: vault
  replicas: 1

  selector:
    matchLabels:
      app: vault

  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault

      containers:
        - name: vault
          image: registry.connect.redhat.com/hashicorp/vault:latest
     
          env:
            - name: SKIP_CHOWN
              value: "true"
            - name: SKIP_SETCAP
              value: "true"

          volumeMounts:
            - name: vault-data
              mountPath: /vault/data

            - name: vault-config
              mountPath: /vault/config

      volumes:
        - name: vault-config
          configMap:
            name: vault-config
            
  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

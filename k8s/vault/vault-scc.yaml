apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: vault-scc
allowPrivilegedContainer: false
allowPrivilegeEscalation: false

requiredDropCapabilities:
  - ALL

allowedCapabilities:
  - IPC_LOCK

runAsUser:
  type: MustRunAsRange

seLinuxContext:
  type: MustRunAs

fsGroup:
  type: MustRunAs

supplementalGroups:
  type: RunAsAny

volumes:
  - configMap
  - emptyDir
  - persistentVolumeClaim
  - secret

readOnlyRootFilesystem: false

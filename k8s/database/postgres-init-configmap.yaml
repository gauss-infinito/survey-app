apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
data:
  init.sql: |
    -- EXTENSÃO (necessária para UUID)
    CREATE EXTENSION IF NOT EXISTS pgcrypto;
    
    CREATE TYPE role_type AS ENUM (
      'administrator', 'researcher', 'respondent'
    );
    
    CREATE TYPE age_type AS ENUM (
      'young', 'adult', 'elderly'
    );
    
    CREATE TYPE gender_type AS ENUM (
      'cis-woman', 'trans-woman', 'cis-man', 'trans-man', 'non-binary'
    );
    
    CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      email TEXT UNIQUE NOT NULL,
      code VARCHAR(16) NOT NULL,
      age age_type,
      gender gender_type,
      role role_type DEFAULT 'respondent',
      active BOOLEAN DEFAULT true,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP
    );
    
    CREATE TABLE IF NOT EXISTS surveys (
      id SERIAL PRIMARY KEY,
      title TEXT NOT NULL,
      description TEXT,
      status TEXT,
      user_id INTEGER NOT NULL REFERENCES users(id),
      public_id UUID NOT NULL DEFAULT gen_random_uuid(),
      UNIQUE (public_id),
      questions JSONB
    );
         
    CREATE TABLE IF NOT EXISTS responses (
      id SERIAL PRIMARY KEY,
      survey_id INTEGER NOT NULL REFERENCES surveys(id) ON DELETE CASCADE,
      age age_type,
      gender gender_type,
      answers JSONB
    );
       
    -- ROLE + ACTIVE CHECK (corrigido)
    CREATE OR REPLACE FUNCTION check_user_role_for_survey()
    RETURNS TRIGGER AS $$
    DECLARE
      user_role role_type; 
      user_active BOOLEAN;
    BEGIN
      SELECT role, active INTO user_role, user_active
      FROM users
      WHERE id = NEW.user_id;
    
      IF user_active IS NOT TRUE THEN
        RAISE EXCEPTION 'Usuário inativo não pode criar pesquisa';
      END IF;
    
      IF user_role NOT IN ('administrator', 'researcher') THEN
        RAISE EXCEPTION 'Usuário não autorizado (role deve ser administrator ou researcher)';
      END IF;
    
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;
    
    CREATE TRIGGER trg_check_user_role
    BEFORE INSERT ON surveys
    FOR EACH ROW
    EXECUTE FUNCTION check_user_role_for_survey();
    
    -- INDEXES
    CREATE INDEX idx_responses_survey ON responses(survey_id);
